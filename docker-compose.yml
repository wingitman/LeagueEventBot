services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discord-league-bot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - GUILD_ID=${GUILD_ID}
      - DATABASE_PATH=/app/data/league.db
      - DEFAULT_RANK=${DEFAULT_RANK:-silver}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - bot-data:/app/data
    # Uncomment below if you want to use a .env file
    # env_file:
    #   - .env

volumes:
  bot-data:
    driver: local
